# =============================================================================
# Wikimedia Big Data — stack Docker Compose
#
# Démarrer :  docker compose up -d
# Arrêter :   docker compose down
# Logs :      docker compose logs -f <service>
#
# Ports exposés sur l'hôte :
#   2181  Zookeeper
#   9092  Kafka (producteur Python sur la machine hôte)
#   7077  Spark Master RPC
#   8080  Spark Master UI
#   8081  Spark Worker UI
#   8020  HDFS RPC (namenode)
#   9870  HDFS Namenode UI
#   9864  HDFS Datanode UI
#   8088  Airflow 3 UI (mappe le port 8080 du conteneur)
#   8501  Dashboard Streamlit
#
# Kafka interne Docker : kafka:29092 (Spark, dashboard Live)
# =============================================================================

name: Projet-wikimedia

networks:
  bigdata-net:
    driver: bridge

volumes:
  zookeeper-data:
  kafka-data:
  namenode-data:
  datanode-data:
  postgres-data:
  airflow-logs:

# Paramètres Airflow 3 partagés (api-server, scheduler, dag-processor)
x-airflow-common: &airflow-common
  image: apache/airflow:3.2.1-python3.11
  env_file:
    - .env
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: "http://airflow-api-server:8080/execution/"
    AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW__API_AUTH__JWT_SECRET:-airflow_jwt_secret}
    AIRFLOW__API_AUTH__JWT_ISSUER: ${AIRFLOW__API_AUTH__JWT_ISSUER:-airflow}
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"
    AIRFLOW_CONFIG: "/opt/airflow/config/airflow.cfg"
    KAFKA_BOOTSTRAP: kafka:29092
    INGESTION_BATCH_SIZE: "300"
    AIRFLOW_ADMIN_USER: ${AIRFLOW_ADMIN_USER:-admin}
    AIRFLOW_ADMIN_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:-admin}
    WEBHDFS_BASE: http://namenode:9870/webhdfs/v1
    WEBHDFS_RETRIES: "5"
    WEBHDFS_RETRY_DELAY_SEC: "2"
    _PIP_ADDITIONAL_REQUIREMENTS: "requests>=2.31.0 sseclient-py>=1.8.0 kafka-python>=2.0.2"
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins
    - ./airflow/config:/opt/airflow/config
    - ./ingestion:/opt/airflow/ingestion:ro
  user: "${AIRFLOW_UID:-50000}:0"
  networks:
    - bigdata-net
  depends_on:
    postgres:
      condition: service_healthy
    namenode:
      condition: service_healthy

services:

  # ---------------------------------------------------------------------------
  # Zookeeper — service de coordination requis par Kafka
  # Interface web : aucune | Port : 2181 (connexions client)
  # ---------------------------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.3
    container_name: zookeeper
    networks:
      - bigdata-net
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Kafka — plateforme de streaming d'événements / courtier de messages
  # Port : 9092 (production/consommation depuis votre machine hôte)
  # ---------------------------------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.5.3
    container_name: kafka
    networks:
      - bigdata-net
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka-data:/var/lib/kafka/data
    depends_on:
      zookeeper:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Spark Master — coordonne les jobs Spark et les nœuds worker
  # Interface web : http://localhost:8080 | Port cluster : 7077
  # ---------------------------------------------------------------------------
  spark-master:
    image: bitnamilegacy/spark:3.5.1
    container_name: spark-master
    networks:
      - bigdata-net
    ports:
      - "8080:8080"   # Interface web Spark Master
      - "7077:7077"   # RPC Spark Master (les workers s'y connectent)
    environment:
      SPARK_MODE: master
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
      SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED: "no"
      SPARK_SSL_ENABLED: "no"
    volumes:
      - ./spark/apps:/opt/bitnami/spark/apps
      - ./spark/jobs:/opt/bitnami/spark/jobs
      - ./spark/data:/opt/bitnami/spark/data

  # ---------------------------------------------------------------------------
  # Spark Worker — exécute les tâches assignées par le master
  # Interface web : http://localhost:8081
  # ---------------------------------------------------------------------------
  spark-worker:
    image: bitnamilegacy/spark:3.5.1
    container_name: spark-worker
    networks:
      - bigdata-net
    ports:
      - "8081:8081"   # Interface web Spark Worker
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_MEMORY: 1G
      SPARK_WORKER_CORES: 1
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
      SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED: "no"
      SPARK_SSL_ENABLED: "no"
    depends_on:
      - spark-master
    volumes:
      - ./spark/apps:/opt/bitnami/spark/apps
      - ./spark/jobs:/opt/bitnami/spark/jobs
      - ./spark/data:/opt/bitnami/spark/data

  # ---------------------------------------------------------------------------
  # HDFS Namenode — gestionnaire de métadonnées du système de fichiers Hadoop
  # Interface web : http://localhost:9870 | RPC : 8020
  # ---------------------------------------------------------------------------
  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: hdfs-namenode
    hostname: namenode
    networks:
      bigdata-net:
        aliases:
          - namenode
          - hdfs-namenode
    ports:
      - "9870:9870"   # Interface web Namenode
      - "8020:8020"   # RPC HDFS (fs.defaultFS)
    env_file:
      - ./config/hadoop.env
    environment:
      CLUSTER_NAME: bigdata-wikimedia
    volumes:
      - namenode-data:/hadoop/dfs/name
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9870"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s

  # ---------------------------------------------------------------------------
  # HDFS Datanode — stocke les blocs de données sur disque
  # Interface web : http://localhost:9864
  # ---------------------------------------------------------------------------
  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: hdfs-datanode
    networks:
      - bigdata-net
    ports:
      - "9864:9864"   # Interface web Datanode
      - "9866:9866"   # Transfert de données (interne)
    env_file:
      - ./config/hadoop.env
    environment:
      SERVICE_PRECONDITION: namenode:9870
    volumes:
      - datanode-data:/hadoop/dfs/data
    depends_on:
      namenode:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Postgres — base de métadonnées Airflow (requise pour api-server + scheduler)
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: airflow-postgres
    networks:
      - bigdata-net
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # Airflow Init — migrations DB, création de l'utilisateur admin, permissions
  # S'exécute une fois au premier démarrage, puis s'arrête.
  # ---------------------------------------------------------------------------
  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        mkdir -p /opt/airflow/{logs,dags,plugins,config}
        /entrypoint airflow version
        /entrypoint airflow config list >/dev/null
        # Ne pas chown ingestion/ (volume :ro) — sinon exit 1 sur Windows
        chown -R "${AIRFLOW_UID:-50000}:0" /opt/airflow/logs /opt/airflow/dags /opt/airflow/plugins /opt/airflow/config
    environment:
      <<: *airflow-common-env
      _PIP_ADDITIONAL_REQUIREMENTS: ""
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: ${AIRFLOW_ADMIN_USER:-admin}
      _AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:-admin}
    user: "0:0"
    restart: "no"

  # ---------------------------------------------------------------------------
  # Airflow API Server — interface web et API (remplace le webserver en v3)
  # Interface web : http://localhost:8088  (port mappé pour éviter le conflit avec Spark :8080)
  # Connexion : admin / admin (modifiable dans .env)
  # ---------------------------------------------------------------------------
  airflow-api-server:
    <<: *airflow-common
    container_name: airflow-api-server
    command: api-server
    ports:
      - "8088:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/monitor/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ---------------------------------------------------------------------------
  # Airflow DAG Processor — analyse les fichiers DAG (obligatoire en Airflow 3)
  # Aucun port public
  # ---------------------------------------------------------------------------
  airflow-dag-processor:
    <<: *airflow-common
    container_name: airflow-dag-processor
    command: dag-processor
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type DagProcessorJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ---------------------------------------------------------------------------
  # Airflow Scheduler — déclenche les exécutions de DAGs selon leur planification
  # Aucun port public (health check interne sur le port 8974)
  # ---------------------------------------------------------------------------
  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      airflow-api-server:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Dashboard Streamlit — Historical (HDFS reports) + Live (Kafka)
  # Interface web : http://localhost:8501
  # ---------------------------------------------------------------------------
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: wikimedia-dashboard
    env_file:
      - .env
    networks:
      - bigdata-net
    ports:
      - "8501:8501"
    # Monte app.py depuis l'hôte : évite l'ancienne image Docker après modification du code
    volumes:
      - ./dashboard/app.py:/app/app.py:ro
      - ./dashboard/.streamlit:/app/.streamlit:ro
    environment:
      WEBHDFS_BASE: http://namenode:9870/webhdfs/v1
      HDFS_REPORTS_PATH: /data/wikimedia/reports
      HDFS_DATA_ROOT: /data/wikimedia
      AIRFLOW_API_BASE: http://airflow-api-server:8080/api/v2
      AIRFLOW_ADMIN_USER: ${AIRFLOW_ADMIN_USER:-admin}
      AIRFLOW_ADMIN_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:-admin}
      KAFKA_HOST: kafka
      KAFKA_PORT: "29092"
      KAFKA_BOOTSTRAP: kafka:29092
      KAFKA_TOPIC: wm.recentchange.raw
      LIVE_REFRESH_SECONDS: "10"
      LIVE_MAX_EVENTS: "1000"
      LIVE_POLL_TIMEOUT_MS: "5000"
      SPARK_UI_URL: http://spark-master:8080
      AIRFLOW_HEALTH_URL: http://airflow-api-server:8080/api/v2/monitor/health
      DASHBOARD_REFRESH_SECONDS: "30"
    depends_on:
      namenode:
        condition: service_healthy
      kafka:
        condition: service_started
      spark-master:
        condition: service_started
      airflow-api-server:
        condition: service_started
    restart: unless-stopped
